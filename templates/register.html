<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TRINETRA AI | Register</title>

    <link rel="icon" type="image/png"
          href="{{ url_for('static', filename='images/Icon.png') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/register.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="overlay"></div>

<div class="container">

    <!-- ================= LEFT ================= -->

    <div class="left-panel">

        <img src="{{ url_for('static', filename='images/Primary.png') }}"
             class="logo">

        <h1>Join TRINETRA AI</h1>

        <p>

            Empowering Farmers through Artificial Intelligence,
            Climate Intelligence, Smart Irrigation,
            Krishi Bazaar, Krishi Gurukul,
            Government Schemes and Sustainable Agriculture.

        </p>

    </div>


    <!-- ================= RIGHT ================= -->

    <div class="right-panel">

        <form action="/registration"
              method="POST"
              class="register-form">

            <h2>Create Account</h2>

            <!-- Full Name -->

            <div class="input-box">

                <i class="fas fa-user"></i>

                <input type="text"
                       name="full_name"
                       placeholder="Full Name"
                       required>

            </div>

            <!-- Email -->

            <div class="input-box">

                <i class="fas fa-envelope"></i>

                <input type="email"
                       name="email"
                       placeholder="Email Address"
                       required>

            </div>

            <!-- Password -->

<div class="input-box">

    <i class="fas fa-lock"></i>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

</div>

<!-- Confirm Password -->

<div class="input-box">

    <i class="fas fa-lock"></i>

    <input type="password"
           name="confirm_password"
           placeholder="Confirm Password"
           required>

</div>
            <!-- Mobile -->

            <div class="input-box">

                <i class="fas fa-phone"></i>

                <input type="text"
                       name="mobile"
                       placeholder="Mobile Number"
                       required>

            </div>

            <!-- State -->

            <div class="input-box">

                <i class="fas fa-map-marker-alt"></i>

                <input type="text"
                       name="state"
                       placeholder="State"
                       required>

            </div>

            <!-- District -->

           <!-- District -->

<div class="input-box">

    <i class="fas fa-map"></i>

    <input type="text"
           name="district"
           placeholder="District"
           required>

</div>

<!-- Village -->

<div class="input-box">

    <i class="fas fa-house"></i>

    <input type="text"
           name="village"
           placeholder="Village"
           required>

</div>

<!-- Language -->

<div class="input-box">

    <i class="fas fa-language"></i>

    <input type="text"
           name="language"
           placeholder="Preferred Language"
           required>

</div>

<!-- Register Button -->

<button type="submit" class="register-btn">
    Create Account
</button>

<p class="login-link">
    Already have an account?
    <a href="/login">Login</a>
</p>

</form>
